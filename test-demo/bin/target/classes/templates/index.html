<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档分段处理器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8eeff;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        
        #fileInput {
            display: none;
        }
        
        .file-list {
            margin-top: 16px;
        }
        
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .file-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .file-icon {
            font-size: 24px;
        }
        
        .file-name {
            font-size: 14px;
            color: #333;
        }
        
        .file-size {
            font-size: 12px;
            color: #999;
        }
        
        .file-remove {
            background: none;
            border: none;
            color: #999;
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
        }
        
        .file-remove:hover {
            color: #e74c3c;
        }
        
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            resize: vertical;
            font-family: inherit;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .char-count {
            text-align: right;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        
        .loading-overlay.active {
            display: flex;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 20px;
            color: #666;
            font-size: 16px;
        }
        
        .results {
            margin-top: 30px;
            display: none;
        }
        
        .results.show {
            display: block;
        }
        
        .results h2 {
            font-size: 20px;
            margin-bottom: 16px;
            color: #333;
        }
        
        .result-item {
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            border: 1px solid #e0e0e0;
        }
        
        .result-item.success {
            background: #f8f9fa;
            border-color: #c3e6cb;
        }
        
        .result-item.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
        
        .result-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .result-status {
            font-size: 20px;
        }
        
        .result-filename {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }
        
        .result-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            font-size: 14px;
            color: #666;
        }
        
        .result-stat {
            background: #e3f2fd;
            padding: 6px 12px;
            border-radius: 16px;
        }
        
        .result-link {
            color: #667eea;
            text-decoration: none;
        }
        
        .result-link:hover {
            text-decoration: underline;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 4px;
        }
        
        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 16px;
            border-radius: 4px;
            margin-bottom: 24px;
        }
        
        .info-box h3 {
            font-size: 14px;
            color: #1976d2;
            margin-bottom: 8px;
        }
        
        .info-box ul {
            margin-left: 20px;
            color: #555;
            font-size: 13px;
            line-height: 1.8;
        }
        
        /* 分段展示样式 */
        .chunks-section {
            margin-top: 20px;
        }
        
        .chunks-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        
        .chunks-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .toggle-chunks-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        
        .toggle-chunks-btn:hover {
            background: #5a6fd6;
        }
        
        .chunks-container {
            display: none;
            max-height: 600px;
            overflow-y: auto;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background: #fafafa;
        }
        
        .chunks-container.show {
            display: block;
        }
        
        .chunk-item {
            padding: 16px;
            border-bottom: 1px solid #e0e0e0;
            background: white;
        }
        
        .chunk-item:last-child {
            border-bottom: none;
        }
        
        .chunk-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px dashed #e0e0e0;
        }
        
        .chunk-index {
            font-weight: 600;
            color: #667eea;
            font-size: 14px;
        }
        
        .chunk-size {
            font-size: 12px;
            color: #999;
            background: #f0f0f0;
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        .chunk-content {
            font-size: 13px;
            line-height: 1.8;
            color: #444;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            background: #fafafa;
            padding: 12px;
            border-radius: 6px;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        
        .prompt-section {
            margin-bottom: 16px;
            padding: 12px;
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            border-radius: 4px;
        }
        
        .prompt-label {
            font-size: 12px;
            color: #e65100;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .prompt-content {
            font-size: 13px;
            color: #555;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 文档分段处理器</h1>
        <p class="subtitle">上传文档，自动分段处理并展示</p>
        
        <div class="info-box">
            <h3>📋 使用说明</h3>
            <ul>
                <li>支持格式：PDF、Word（DOC/DOCX）、TXT、Markdown（MD）</li>
                <li>最多可同时上传 10 个文件</li>
                <li>系统会自动将文档转为纯文本，按 5000 字分段处理</li>
                <li>处理结果会在页面展示所有分段内容</li>
            </ul>
        </div>
        
        <form id="uploadForm">
            <div class="form-group">
                <label>📁 上传文档（1-10个）</label>
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">📂</div>
                    <div class="upload-text">点击或拖拽文件到此处上传</div>
                    <div class="upload-hint">支持 PDF、Word、TXT、MD 格式</div>
                </div>
                <input type="file" id="fileInput" multiple accept=".pdf,.doc,.docx,.txt,.md">
                <div class="file-list" id="fileList"></div>
            </div>
            
            <div class="form-group">
                <label>💬 提示词（Prompt）</label>
                <textarea 
                    id="promptInput" 
                    placeholder="请输入提示词，这段内容会被添加到每个文档的开头...

例如：
- 请总结以下文档的核心观点
- 这是一份研究报告，请提取关键数据
- 请根据以下内容撰写一份摘要"
                ></textarea>
                <div class="char-count"><span id="charCount">0</span> 字符</div>
            </div>
            
            <button type="submit" class="submit-btn" id="submitBtn" disabled>
                🚀 开始处理文档
            </button>
        </form>
        
        <div class="results" id="results">
            <h2>📊 处理结果</h2>
            <div id="resultsList"></div>
        </div>
    </div>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">正在处理文档，请稍候...</div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const promptInput = document.getElementById('promptInput');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const uploadForm = document.getElementById('uploadForm');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const results = document.getElementById('results');
        const resultsList = document.getElementById('resultsList');
        
        let selectedFiles = [];
        
        // 文件类型图标
        const fileIcons = {
            'pdf': '📕',
            'doc': '📘',
            'docx': '📘',
            'txt': '📄',
            'md': '📝',
            'default': '📎'
        };
        
        // 点击上传区域
        uploadArea.addEventListener('click', () => fileInput.click());
        
        // 拖拽事件
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            addFiles(files);
        });
        
        // 文件选择
        fileInput.addEventListener('change', () => {
            addFiles(Array.from(fileInput.files));
        });
        
        // 添加文件
        function addFiles(files) {
            const validTypes = ['application/pdf', 'application/msword', 
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'text/plain', 'text/markdown'];
            const validExtensions = ['.pdf', '.doc', '.docx', '.txt', '.md'];
            
            files.forEach(file => {
                const extension = '.' + file.name.split('.').pop().toLowerCase();
                if (validExtensions.includes(extension) || validTypes.includes(file.type)) {
                    if (!selectedFiles.find(f => f.name === file.name && f.size === file.size)) {
                        if (selectedFiles.length < 10) {
                            selectedFiles.push(file);
                        } else {
                            alert('最多只能上传10个文件');
                        }
                    }
                } else {
                    alert(`不支持的文件格式: ${file.name}`);
                }
            });
            
            updateFileList();
            updateSubmitButton();
        }
        
        // 更新文件列表
        function updateFileList() {
            fileList.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const extension = file.name.split('.').pop().toLowerCase();
                const icon = fileIcons[extension] || fileIcons.default;
                const size = formatFileSize(file.size);
                
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <div class="file-info">
                        <span class="file-icon">${icon}</span>
                        <div>
                            <div class="file-name">${file.name}</div>
                            <div class="file-size">${size}</div>
                        </div>
                    </div>
                    <button type="button" class="file-remove" onclick="removeFile(${index})">✕</button>
                `;
                fileList.appendChild(fileItem);
            });
        }
        
        // 格式化文件大小
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // 移除文件
        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            updateSubmitButton();
        };
        
        // 字符计数
        promptInput.addEventListener('input', () => {
            charCount.textContent = promptInput.value.length;
        });
        
        // 更新提交按钮状态
        function updateSubmitButton() {
            submitBtn.disabled = selectedFiles.length === 0;
            submitBtn.textContent = selectedFiles.length > 0 
                ? `🚀 开始处理文档 (${selectedFiles.length}个文件)`
                : '🚀 开始处理文档';
        }
        
        // 表单提交
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (selectedFiles.length === 0) {
                alert('请至少选择一个文件');
                return;
            }
            
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('files', file);
            });
            formData.append('prompt', promptInput.value);
            
            loadingOverlay.classList.add('active');
            
            try {
                const response = await fetch('/api/documents/upload', {
                    method: 'POST',
                    body: formData
                });
                
                const results = await response.json();
                displayResults(results);
            } catch (error) {
                alert('处理失败: ' + error.message);
            } finally {
                loadingOverlay.classList.remove('active');
            }
        });
        
        // 显示结果
        function displayResults(data) {
            resultsList.innerHTML = '';
            results.classList.add('show');
            
            data.forEach((result, index) => {
                const resultItem = document.createElement('div');
                resultItem.className = `result-item ${result.success ? 'success' : 'error'}`;
                
                if (result.success) {
                    let chunksHtml = '';
                    if (result.chunks && result.chunks.length > 0) {
                        chunksHtml = `
                            <div class="chunks-section">
                                <div class="chunks-header">
                                    <span class="chunks-title">📑 分段详情 (${result.chunks.length}段)</span>
                                    <button type="button" class="toggle-chunks-btn" onclick="toggleChunks(${index})">
                                        展开查看
                                    </button>
                                </div>
                                <div class="chunks-container" id="chunks-${index}">
                                    ${result.chunks.map((chunk, i) => `
                                        <div class="chunk-item">
                                            <div class="chunk-header">
                                                <span class="chunk-index">第 ${i + 1} 段</span>
                                                <span class="chunk-size">${chunk.characterCount} 字符</span>
                                            </div>
                                            <div class="chunk-content">${escapeHtml(chunk.content)}</div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    let promptHtml = '';
                    if (result.prompt && result.prompt.trim()) {
                        promptHtml = `
                            <div class="prompt-section">
                                <div class="prompt-label">💬 提示词 (Prompt)</div>
                                <div class="prompt-content">${escapeHtml(result.prompt)}</div>
                            </div>
                        `;
                    }
                    
                    resultItem.innerHTML = `
                        <div class="result-header">
                            <span class="result-status">✅</span>
                            <span class="result-filename">${result.fileName}</span>
                        </div>
                        <div class="result-stats">
                            <span class="result-stat">📊 总字符: ${result.totalCharacters.toLocaleString()}</span>
                            <span class="result-stat">📑 分段数: ${result.totalChunks}</span>
                            <span class="result-stat">🔗 <a href="${result.notionPageUrl}" target="_blank" class="result-link">Notion页面</a></span>
                        </div>
                        ${promptHtml}
                        ${chunksHtml}
                    `;
                } else {
                    resultItem.innerHTML = `
                        <div class="result-header">
                            <span class="result-status">❌</span>
                            <span class="result-filename">${result.fileName}</span>
                        </div>
                        <div class="error-message">错误: ${result.errorMessage}</div>
                    `;
                }
                
                resultsList.appendChild(resultItem);
            });
            
            // 滚动到结果区域
            results.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 切换分段显示
        window.toggleChunks = function(index) {
            const container = document.getElementById(`chunks-${index}`);
            const btn = container.previousElementSibling.querySelector('.toggle-chunks-btn');
            
            if (container.classList.contains('show')) {
                container.classList.remove('show');
                btn.textContent = '展开查看';
            } else {
                container.classList.add('show');
                btn.textContent = '收起';
            }
        };
        
        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
