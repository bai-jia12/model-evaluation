<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档处理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: #555;
            font-weight: bold;
            font-size: 16px;
        }

        .file-input {
            display: block;
            width: 100%;
            padding: 15px;
            border: 2px dashed #ddd;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .file-input:hover {
            border-color: #667eea;
            background: #f0f5ff;
        }

        .prompt-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        .prompt-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .tip {
            color: #666;
            font-size: 14px;
            margin-top: 8px;
        }

        .error {
            color: #e74c3c;
            padding: 15px;
            background: #fdf2f2;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #e74c3c;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>文档处理系统</h1>
        
        <div class="error" th:if="${error}" th:text="${error}"></div>

        <form method="post" th:action="@{/upload}" enctype="multipart/form-data">
            <div class="form-group">
                <label>选择文档 (1~10个)</label>
                <input type="file" name="files" class="file-input" multiple accept=".pdf,.doc,.docx,.txt,.md" required>
                <div class="tip">支持格式: PDF, Word (.doc/.docx), TXT, MD</div>
            </div>

            <div class="form-group">
                <label>提示词 (Prompt)</label>
                <textarea name="prompt" class="prompt-input" placeholder="请输入统一使用的提示词..." required></textarea>
                <div class="tip">此提示词将统一应用到所有文档处理结果</div>
            </div>

            <button type="submit" class="submit-btn">开始处理</button>
        </form>
    </div>
</body>
</html>
